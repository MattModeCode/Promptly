<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Variant B — Mattmode Mono</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    display: flex; align-items: center; justify-content: center;
    background: #0a0a0f;
    -webkit-font-smoothing: antialiased;
  }
  .palette {
    width: 560px;
    background: #0f0f14;
    border-radius: 6px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 2px 6px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .field {
    display: flex; align-items: center;
    padding: 14px 16px;
    font-size: 14px; color: #e2e8f0; letter-spacing: 0;
  }
  .caret {
    width: 1.5px; height: 18px; background: #e2e8f0;
    animation: blink 1.1s steps(1) infinite; margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .rows { padding: 6px; }
  .row {
    position: relative;
    display: flex; align-items: baseline; gap: 14px;
    height: 38px; padding: 0 12px; border-radius: 4px;
  }
  .row .title { font-size: 13px; font-weight: 500; color: #e2e8f0; white-space: nowrap; }
  .row .desc  { font-size: 12px; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row:not(.sel) .title { color: #b8c0cc; }
  .row.sel { background: rgba(226,232,240,0.06); }
  /* silver left-edge accent bar on the selected row */
  .row.sel::before {
    content: ""; position: absolute; left: 0; top: 6px; bottom: 6px;
    width: 2px; border-radius: 2px; background: rgba(226,232,240,0.55);
  }
  /* matched characters: brighter pure white, heavier — no swatch, no color */
  .m { color: #ffffff; font-weight: 600; }
  .footer {
    display: flex; justify-content: center; gap: 16px;
    padding: 9px; font-size: 11px; color: #475569;
  }
  .footer kbd { font: inherit; color: #64748b; }
</style>
</head>
<body>
  <div class="palette">
    <div class="field"><span>pr</span><span class="caret"></span></div>
    <div class="rows">
      <div class="row sel">
        <span class="title"><span class="m">P</span><span class="m">R</span> description</span>
        <span class="desc">summarize the diff, risks, test plan</span>
      </div>
      <div class="row">
        <span class="title"><span class="m">Pr</span>oduct requirements</span>
        <span class="desc">problem, users, scope, success metrics</span>
      </div>
      <div class="row">
        <span class="title">Bug re<span class="m">p</span>o<span class="m">r</span>t triage</span>
        <span class="desc">file a structured bug with repro</span>
      </div>
      <div class="row">
        <span class="title">S<span class="m">pr</span>int planning</span>
        <span class="desc">goals, capacity, commitments</span>
      </div>
    </div>
    <div class="footer"><span><kbd>↑↓</kbd> move</span><span><kbd>↵</kbd> paste</span><span><kbd>esc</kbd> dismiss</span></div>
  </div>
</body>
</html>
