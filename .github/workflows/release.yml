name: Release

# Build a Universal Promptly.app and attach it to a GitHub Release whenever a
# version tag (e.g. v0.1.0) is pushed. Ad-hoc signed — no certificates or secrets required.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Universal .app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x scripts/release.sh
          ./scripts/release.sh "$VERSION"

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/Promptly-*.zip \
            --title "Promptly $GITHUB_REF_NAME" \
            --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" dist/Promptly-*.zip --clobber
